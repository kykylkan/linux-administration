apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-django-app
  labels:
    app: {{ .Release.Name }}-django-app
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-django-app
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
