replicaCount: 2

image:
  repository: "<ECR_REPOSITORY_URL>"   # filled in by Jenkinsfile at build/deploy time
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

env:
  DJANGO_SETTINGS_MODULE: "config.settings.production"
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "*"
  DB_NAME: "django_app"
  DB_HOST: "<RDS_ENDPOINT>"          # filled in from terraform output rds_endpoint
  DB_PORT: "5432"

# Never commit real values here - override via `helm upgrade --set secrets.xxx=...`
# or a CI-injected values file kept out of git (Jenkinsfile does this).
secrets:
  dbUser: ""
  dbPassword: ""
  djangoSecretKey: ""

livenessProbe:
  path: /healthz/
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  path: /readyz/
  initialDelaySeconds: 5
  periodSeconds: 10
