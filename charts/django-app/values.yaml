replicaCount: 2

image:
  repository: "<ECR_REPOSITORY_URL>"   # оновлюється автоматично Jenkins pipeline
  tag: "latest"                        # замінюється на конкретний тег (git SHA/build number)
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

env:
  DJANGO_SETTINGS_MODULE: "config.settings.production"
  DEBUG: "False"
  ALLOWED_HOSTS: "*"

envSecret:
  # Значення підтягуються з Kubernetes Secret "django-app-secrets",
  # який створюється окремо (не через цей chart) і НЕ комітиться в git.
  secretName: "django-app-secrets"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

probes:
  livenessPath: /healthz/
  readinessPath: /healthz/
