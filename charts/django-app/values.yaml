# ── Image ────────────────────────────────────────────────────────────────────
image:
  repository: ""          # буде підставлено: <account_id>.dkr.ecr.<region>.amazonaws.com/django-app
  tag: "latest"
  pullPolicy: IfNotPresent

# ── Deployment ────────────────────────────────────────────────────────────────
replicaCount: 2

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

# ── HPA ───────────────────────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# ── ConfigMap (Django env variables) ─────────────────────────────────────────
config:
  DEBUG: "False"
  DJANGO_SETTINGS_MODULE: "myproject.settings.production"
  ALLOWED_HOSTS: "*"
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "django_db"
  DATABASE_USER: "django_user"
  # Secrets (рекомендується зберігати в AWS Secrets Manager або k8s Secret)
  # DATABASE_PASSWORD передається окремо через Secret
  REDIS_URL: "redis://redis-service:6379/0"
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  STATIC_URL: "/static/"
  MEDIA_URL: "/media/"
  TIME_ZONE: "UTC"
  LANGUAGE_CODE: "en-us"

# ── Ingress (бонус) ───────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  host: yourdomain.com
  path: /
  pathType: Prefix
  tls: true
  certManagerIssuer: letsencrypt-prod
