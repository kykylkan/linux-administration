server:
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

controller:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"

repoServer:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"

configs:
  params:
    server.insecure: true
