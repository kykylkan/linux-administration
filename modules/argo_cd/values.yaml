# Helm values для argo/argo-cd

server:
  service:
    type: ClusterIP
  extraArgs:
    - --insecure   # спрощення для навчального стенду; в проді - TLS/Ingress

configs:
  params:
    server.insecure: true

controller:
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"

repoServer:
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
