controller:
  serviceType: ClusterIP
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
persistence:
  enabled: true
  size: "8Gi"
  storageClass: "gp3"

agent:
  enabled: true
  namespace: jenkins

serviceAccount:
  create: true
  name: jenkins
