controller:
  serviceType: ClusterIP
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  installPlugins:
    - kubernetes:4231.vca_7a_453e17e1
    - workflow-aggregator:596.v8c21c963d92d
    - git:5.2.2
    - configuration-as-code:1775.v810dc950b_514
    - docker-workflow:580.vc0c340686b_8f
    - blueocean:1.27.14

persistence:
  enabled: true
  size: "8Gi"
  storageClass: "gp3"

agent:
  enabled: true
  namespace: jenkins

serviceAccount:
  create: true
  name: jenkins
